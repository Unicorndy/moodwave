<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodwave</title>
  <style>
    :root { --bg: #0a0a10; --panel: #1b1b26; --accent: #6c5ce7; --text: #eee; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: radial-gradient(1200px 600px at 50% -10%, #181826, var(--bg)); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh; padding: 20px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; letter-spacing: .3px; }
    .sub { color: #9aa; font-size: 13px; margin: 0 0 16px; }

    .player {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: var(--panel); padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,.35); position: sticky; top: 12px; z-index: 50;
    }
    .player button {
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 8px 14px; font-size: 14px; cursor: pointer;
    }
    .player button.secondary { background: #2d2d3a; }
    .scrubber { flex: 1; min-width: 120px; height: 8px; background: #333; border-radius: 4px; position: relative; cursor: pointer; }
    .scrubber-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--accent); border-radius: 4px; pointer-events: none; }
    select { background: #2d2d3a; color: var(--text); border: none; border-radius: 6px; padding: 8px; font-size: 14px; }
    .vu { display: flex; gap: 3px; align-items: flex-end; height: 24px; }
    .vu span { width: 4px; height: 2px; background: var(--accent); border-radius: 1px; }
    .error { color: #ff6b6b; font-size: 13px; }
    .player button.nav { padding: 8px 10px; }
    .player button.live { background: #b91c1c; }
    .player button.live::after { content: " ⏺"; }
    .playlist { flex-basis: 100%; display: flex; flex-wrap: wrap; gap: 6px; }
    .playlist:empty { display: none; }
    .pl-item {
      display: inline-flex; align-items: center; gap: 6px;
      background: #2d2d3a; border-radius: 999px; padding: 4px 6px 4px 12px;
      font-size: 12.5px; cursor: pointer; color: #cdd; max-width: 240px;
      border: 1px solid transparent;
    }
    .pl-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pl-item.current { border-color: var(--accent); color: #fff; background: #34304f; }
    .pl-item.current .name::before { content: "♪ "; color: var(--accent); }
    .pl-item .rm {
      width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer;
      background: #44445a; color: #bbb; font-size: 11px; line-height: 1; padding: 0;
    }
    .pl-item .rm:hover { background: #ef4444; color: #fff; }

    /* ===== page background customizer ===== */
    #bgWall {
      position: fixed; inset: -48px; z-index: -2; display: none;
      background-position: center; background-repeat: no-repeat;
      filter: blur(18px) brightness(0.55);
    }
    #bgWall.fill { background-size: cover; }
    #bgWall.stretch { background-size: 100% 100%; }
    #bgWall.retain { background-size: auto; }
    body.has-wall { background: transparent; }
    /* animated gradient themes live on a FIXED viewport-sized layer so the
       300% gradient motion is actually visible (on body it was too large to see) */
    #bgGrad {
      position: fixed; inset: 0; z-index: -3; display: none;
      background-size: 300% 300%; background-position: 0% 50%;
    }
    #bgGrad.on { display: block; }
    #bgGrad.anim { animation: bgshift 11s linear infinite; } /* faster + linear so motion reads clearly */
    @keyframes bgshift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    /* dark ends + bright neon mid-band -> a luminous wave visibly sweeps the page */
    #bgGrad.bg-aurora { background-image: linear-gradient(120deg,#02040a,#1f7a8c,#7b2ff7,#22d3ee,#02040a); }
    #bgGrad.bg-sunset { background-image: linear-gradient(120deg,#0a0205,#ff5e3a,#ff2d95,#ffb300,#0a0205); }
    #bgGrad.bg-ocean  { background-image: linear-gradient(120deg,#01040a,#0aa1dd,#19e0b8,#38bdf8,#01040a); }
    #bgGrad.bg-violet { background-image: linear-gradient(120deg,#05010f,#7b2ff7,#ff2d95,#a855f7,#05010f); }
    #bgGrad.bg-noir   { background-image: linear-gradient(120deg,#000000,#1a1a2e,#3a3a5c,#1a1a2e,#000000); } /* animated black */
    body.has-grad { background: #07070c; }
    .bgpanel[hidden] { display: none; } /* beat .bgpanel's display:flex so hide actually hides */
    .bgpanel {
      flex-basis: 100%; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: #14141d; border-radius: 8px; padding: 10px 12px;
    }
    .bglabel { font-size: 12px; color: #99a; text-transform: uppercase; letter-spacing: .5px; }
    .bgpanel .sw {
      width: 26px; height: 26px; border-radius: 50%; border: 2px solid #333;
      cursor: pointer; padding: 0;
    }
    .bgpanel .sw.active { border-color: var(--accent); }
    .bgpanel select { padding: 6px; font-size: 13px; }
    .bgpanel button.secondary { padding: 6px 10px; font-size: 13px; }

    .grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      max-width: 1280px; margin: 0 auto;
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card {
      aspect-ratio: 1; border-radius: 16px; position: relative; overflow: hidden;
      cursor: pointer; display: flex; align-items: flex-end; padding: 12px;
      color: #fff; font-weight: 600; font-size: 13px; user-select: none;
      transform: scale(var(--react-scale, 1)) translateX(var(--react-x, 0px));
      transition: transform 0.05s linear, filter 0.3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .card .viz {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
      mix-blend-mode: screen;
    }
    .card::after {
      content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
      box-shadow: inset 0 0 calc(55px * var(--react-glow, 0)) calc(14px * var(--react-glow, 0)) var(--accent);
      opacity: var(--react-glow, 0);
    }
    .card .label {
      position: relative; z-index: 2; display: flex; gap: 6px; align-items: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7); background: rgba(0,0,0,.25);
      padding: 4px 9px; border-radius: 999px; backdrop-filter: blur(2px); line-height: 1.1;
    }

    .grid.has-focus .card:not(.focused) { filter: brightness(0.3) blur(2px); }
    .card.focused { z-index: 10; }

    .zoom {
      position: fixed; inset: 0; z-index: 100; cursor: zoom-out;
      background: radial-gradient(1400px 800px at 50% 30%, #14141f, #07070c);
    }
    .zoom[hidden] { display: none; }
    .zoom canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .zoom-label {
      position: absolute; top: 18px; left: 20px; font-size: 17px; font-weight: 600;
      background: rgba(0,0,0,.35); padding: 8px 16px; border-radius: 999px;
      backdrop-filter: blur(4px); pointer-events: none;
    }
    .zoom-hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-size: 12.5px; color: #889; pointer-events: none;
    }
    .zoom-fx { position: absolute; top: 18px; right: 20px; display: flex; gap: 6px; }
    .zoom-fx button {
      background: rgba(0,0,0,.35); color: #778; border: 1px solid #333; border-radius: 999px;
      padding: 6px 12px; font-size: 12px; cursor: pointer; backdrop-filter: blur(4px);
    }
    .zoom-fx button.on { color: #fff; border-color: var(--accent); background: rgba(40,40,70,.5); }
  </style>
</head>
<body>
  <div id="bgGrad"></div>
  <div id="bgWall" class="fill"></div>
  <h1>🎵 Moodwave</h1>
  <p class="sub">101 algorithm × mood pairings. Press Play (or add music) — click a card to focus, click again to zoom fullscreen.</p>

  <div class="player">
    <button class="secondary nav" id="prevBtn" title="Previous track">⏮</button>
    <button id="playBtn">▶ Play</button>
    <button class="secondary nav" id="nextBtn" title="Next track">⏭</button>
    <div class="scrubber" id="scrubber"><div class="scrubber-fill" id="scrubberFill"></div></div>
    <select id="trackSelect"></select>
    <button class="secondary nav" id="loopBtn" title="Loop: all tracks">🔁</button>
    <button class="secondary" id="uploadBtn">⬆ Add music</button>
    <input type="file" id="fileInput" accept="audio/*" multiple hidden />
    <button class="secondary" id="micBtn" title="Visualize from microphone">🎤 Mic</button>
    <button class="secondary" id="tabBtn" title="Capture a tab's audio (e.g. YouTube) — tick 'Share tab audio' in the picker">🖥️ Tab audio</button>
    <button class="secondary" id="bgBtn" title="Page background">🎨 BG</button>
    <div class="vu" id="vu"><span></span><span></span><span></span><span></span><span></span></div>
    <span class="error" id="errorMsg"></span>
    <div class="bgpanel" id="bgPanel" hidden>
      <span class="bglabel">Theme</span>
      <button class="sw" data-bg="" style="background:#0a0a10" title="Default (off)"></button>
      <button class="sw" data-bg="bg-noir" style="background:linear-gradient(135deg,#1a1a2e,#3a3a5c)" title="Noir (animated black)"></button>
      <button class="sw" data-bg="bg-aurora" style="background:linear-gradient(135deg,#1f7a8c,#7b2ff7)" title="Aurora"></button>
      <button class="sw" data-bg="bg-sunset" style="background:linear-gradient(135deg,#7c2d12,#be185d)" title="Sunset"></button>
      <button class="sw" data-bg="bg-ocean" style="background:linear-gradient(135deg,#0c4a6e,#134e4a)" title="Ocean"></button>
      <button class="sw" data-bg="bg-violet" style="background:linear-gradient(135deg,#4c1d95,#831843)" title="Violet"></button>
      <span class="bglabel" style="margin-left:14px">Wallpaper</span>
      <button class="secondary" id="bgImgBtn">⬆ Image</button>
      <select id="bgFit">
        <option value="fill">Fill</option>
        <option value="stretch">Stretch</option>
        <option value="retain">Original size</option>
      </select>
      <button class="secondary" id="bgClear" title="Remove wallpaper">✕</button>
      <input type="file" id="bgFile" accept="image/*" hidden />
      <button class="secondary" id="bgAnimBtn" title="Toggle gradient animation" style="margin-left:14px">🎞️ Animate: On</button>
      <button class="secondary" id="bgHide" title="Collapse this panel" style="margin-left:auto">▲ Hide</button>
    </div>
    <div class="playlist" id="playlist"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="zoom" id="zoom" hidden>
    <canvas id="zoomCanvas"></canvas>
    <div class="zoom-label" id="zoomLabel"></div>
    <div class="zoom-fx" id="zoomFx">
      <button data-fx="aurora" class="on">Aurora</button>
      <button data-fx="waves" class="on">Waves</button>
      <button data-fx="hue" class="on">Hue</button>
      <button data-fx="flash" class="on">Flash</button>
    </div>
    <div class="zoom-hint">click or press Esc to close</div>
  </div>

    } catch (e) {
      animate = () => {}; spring = "ease";
      console.warn("Motion failed to load; running without spring/entrance flourishes.");

    // ===== COLOR HELPERS =====
    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
    }
    const rgba = (c, a) => `rgba(${c.r},${c.g},${c.b},${a})`;
    function noise2(x, y) { return Math.sin(x*1.7 + y*0.3)*0.5 + Math.sin(y*1.3 - x*0.2)*0.3 + Math.sin((x+y)*0.7)*0.2; }
    function hueRotate(c, deg) {
      const r=c.r/255,g=c.g/255,b=c.b/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b);
      let hh=0,s=0;const l=(mx+mn)/2;
      if(mx!==mn){const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);
        hh=mx===r?((g-b)/d+(g<b?6:0)):mx===g?((b-r)/d+2):((r-g)/d+4);hh/=6;}
      hh=(hh+deg/360)%1;if(hh<0)hh+=1;
      if(s===0){const v=Math.round(l*255);return{r:v,g:v,b:v};}
      const q=l<0.5?l*(1+s):l+s-l*s,p=2*l-q;
      const f=(tt)=>{tt=((tt%1)+1)%1;if(tt<1/6)return p+(q-p)*6*tt;if(tt<1/2)return q;if(tt<2/3)return p+(q-p)*(2/3-tt)*6;return p;};
      return {r:Math.round(f(hh+1/3)*255),g:Math.round(f(hh)*255),b:Math.round(f(hh-1/3)*255)};
    }

    // ===== AUDIO MATH =====
    function bandAverage(arr) {
      if (!arr.length) return 0;
      let sum = 0; for (let i = 0; i < arr.length; i++) sum += arr[i];
      return sum / arr.length / 255;
    }
    function splitBands(freq) {
      const n = freq.length, third = Math.max(1, Math.floor(n / 3));
      const slice = (a, b) => Array.prototype.slice.call(freq, a, b);
      return { bass: bandAverage(slice(0, third)), mid: bandAverage(slice(third, third*2)), treble: bandAverage(slice(third*2, n)) };
    }
    function getBands(freq) {
      const n = freq.length;
      const avg = (a, b) => { let s = 0, c = 0; for (let i = a; i < b; i++) { s += freq[i]; c++; } return c ? s/c/255 : 0; };
      return {
        bass: avg(0, Math.max(1, Math.floor(n*0.08))),
        mid: avg(Math.floor(n*0.08), Math.floor(n*0.4)),
        treble: avg(Math.floor(n*0.4), n),
        energy: avg(0, n),
      };
    }
    function makeBeatDetector(threshold = 1.4, decay = 0.95) {
      let avg = 0;
      return { update(energy) { const isBeat = avg > 0 && energy > avg*threshold; avg = avg === 0 ? energy : avg*decay + energy*(1-decay); return isBeat; } };
    }

    // ===== SELF-TESTS =====
    function runSelfTests() {
      console.assert(Math.abs(bandAverage([0,0,0]) - 0) < 1e-6, "bandAverage all-zero -> 0");
      console.assert(Math.abs(bandAverage([255,255,255]) - 1) < 1e-6, "bandAverage all-max -> 1");
      console.assert(Math.abs(bandAverage([0,255]) - 0.5) < 1e-6, "bandAverage mixed -> 0.5");
      const bands = splitBands([255,255,0,0,0,0]);
      console.assert(bands.bass > bands.mid && bands.bass > bands.treble, "splitBands isolates bass");
      const det = makeBeatDetector(1.3, 0.9);
      det.update(0.2); det.update(0.2); det.update(0.2);
      console.assert(det.update(0.9) === true, "detectBeat fires on spike");
      console.assert(det.update(0.2) === false, "detectBeat quiet after spike");
      console.assert(Object.keys(VIZ).length === new Set(MOODS.map(m=>m.viz)).size, "every mood viz is implemented");
      console.log("Self-tests done");
    }

    // ===== AUDIO ENGINE =====
    const engine = {
      ctx: null, analyser: null, freqData: null, waveData: null, source: null,
      buffers: {}, current: null, startedAt: 0, offset: 0, playing: false, duration: 0,
      ensureCtx() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.analyser = this.ctx.createAnalyser();
        this.analyser.fftSize = 1024;
        this.analyser.smoothingTimeConstant = 0.78;
        this.analyser.connect(this.ctx.destination);
        this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
        this.waveData = new Uint8Array(this.analyser.fftSize);
      },
      async makeLoop({ bpm, kick = true, bass = true, hat = true }) {
        const sr = 44100, beats = 8, dur = (60/bpm)*beats;
        const off = new OfflineAudioContext(2, Math.ceil(sr*dur), sr);
        const beatDur = 60/bpm;
        for (let b = 0; b < beats; b++) {
          const t = b*beatDur;
          if (kick) { const o=off.createOscillator(),g=off.createGain();
            o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
            g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
            o.connect(g).connect(off.destination); o.start(t); o.stop(t+0.2); }
          if (bass && b%2===0) { const o=off.createOscillator(),g=off.createGain();
            o.type="sawtooth"; o.frequency.setValueAtTime(80,t);
            g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
            o.connect(g).connect(off.destination); o.start(t); o.stop(t+0.4); }
          if (hat) { const ht=t+beatDur/2; const buf=off.createBuffer(1,Math.floor(sr*0.05),sr),d=buf.getChannelData(0);
            for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
            const n=off.createBufferSource(); n.buffer=buf; const g=off.createGain(); g.gain.value=0.2;
            n.connect(g).connect(off.destination); n.start(ht); }
        }
        return await off.startRendering();
      },
      setBuffer(name, buffer) { this.buffers[name] = buffer; },
      onTrackEnd: null, // set by playlist wiring; called on natural (non-manual) end
      live: false, liveStream: null, liveSrc: null,
      onLiveEnd: null, // called when a live stream ends externally (e.g. "stop sharing")

      // Visualize a live MediaStream (mic or tab capture). The stream feeds the
      // analyser ONLY — not the destination — so there is no echo/feedback.
      playLive(stream) {
        this.ensureCtx();
        if (this.ctx.state === "suspended") this.ctx.resume();
        this.stop(); this.stopLive();
        this.analyser.disconnect(); // detach speakers while analysing live input
        this.liveStream = stream;
        this.liveSrc = this.ctx.createMediaStreamSource(stream);
        this.liveSrc.connect(this.analyser);
        this.live = true; this.current = null; this.duration = 0;
        const track = stream.getAudioTracks()[0];
        if (track) track.onended = () => { this.stopLive(); if (this.onLiveEnd) this.onLiveEnd(); };
      },
      stopLive() {
        if (!this.live && !this.liveStream) return;
        if (this.liveSrc) { try { this.liveSrc.disconnect(); } catch (e) {} this.liveSrc = null; }
        if (this.liveStream) { this.liveStream.getTracks().forEach(tr => tr.stop()); this.liveStream = null; }
        this.live = false;
        if (this.analyser) { try { this.analyser.disconnect(); } catch (e) {} this.analyser.connect(this.ctx.destination); }
      },

      play(name) {
        this.ensureCtx();
        if (this.ctx.state === "suspended") this.ctx.resume();
        this.stopLive();
        const buffer = this.buffers[name]; if (!buffer) return;
        this.stop(); this.current = name; this.duration = buffer.duration;
        const src = this.ctx.createBufferSource();
        this.source = src; src.buffer = buffer;
        src.loop = !name.startsWith("pl-"); // procedural loops repeat; playlist tracks advance
        src.onended = () => { if (this.source === src && this.onTrackEnd) { this.playing = false; this.offset = 0; this.onTrackEnd(); } };
        src.connect(this.analyser); src.start(0, this.offset % buffer.duration);
        this.startedAt = this.ctx.currentTime - this.offset; this.playing = true;
      },
      stop() { if (this.source) { try { this.source.stop(); } catch (e) {} this.source.disconnect(); this.source = null; } this.playing = false; },
      toggle(name) { if (this.playing) { this.offset = this.elapsed(); this.stop(); } else { this.play(name); } },
      elapsed() { return this.playing && this.ctx ? (this.ctx.currentTime - this.startedAt) : this.offset; },
      read() {
        if (!this.analyser) return { bass:0, mid:0, treble:0, energy:0, freq:EMPTY_FREQ, wave:EMPTY_WAVE };
        this.analyser.getByteFrequencyData(this.freqData);
        this.analyser.getByteTimeDomainData(this.waveData);
        return { ...getBands(this.freqData), freq: this.freqData, wave: this.waveData };
      },
    };
    const EMPTY_FREQ = new Uint8Array(512);
    const EMPTY_WAVE = new Uint8Array(1024).fill(128);

    // Synthetic idle signal so visuals breathe before any track plays.
    const IDLE_FREQ = new Uint8Array(512), IDLE_WAVE = new Uint8Array(1024);
    function idleAudio(now) {
      const s = now * 0.001;
      const bass = 0.16 + 0.08*Math.sin(s*1.1), mid = 0.12 + 0.06*Math.sin(s*0.7+1), treble = 0.10 + 0.05*Math.sin(s*1.7+2);
      for (let i = 0; i < IDLE_FREQ.length; i++) {
        const f = i/IDLE_FREQ.length;
        const v = (Math.sin(s*0.8 + f*8)*0.5+0.5)*55*Math.exp(-f*2.5) + bass*50*Math.exp(-f*6);
        IDLE_FREQ[i] = Math.max(0, Math.min(255, v));
      }
      for (let i = 0; i < IDLE_WAVE.length; i++) IDLE_WAVE[i] = Math.max(0, Math.min(255, 128 + Math.sin(i*0.05 + s*3)*22 + Math.sin(i*0.013 + s*1.3)*14));
      return { bass, mid, treble, energy: (bass+mid+treble)/2, freq: IDLE_FREQ, wave: IDLE_WAVE };
    }

    // ===== VISUALIZERS (Canvas 2D) — fn(state, ctx, w, h, audio, beat, t, color) =====
    const TAU = Math.PI * 2;
    const VIZ = {
      flow(s, ctx, w, h, a, beat, t, col) {
        if (!s.ps) { const N = REDUCED ? 24 : 60; s.ps = Array.from({length:N}, () => ({ x:Math.random()*w, y:Math.random()*h, hist:[] })); }
        const maxH = REDUCED ? 4 : 11, sp = 0.4 + a.bass*4.5; ctx.lineCap = "round";
        for (const p of s.ps) {
          let ang = (Math.sin(p.x*0.011 + t*0.0004) + Math.cos(p.y*0.012 - t*0.0003) + Math.sin((p.x+p.y)*0.006 + t*0.0002))*Math.PI + a.mid*Math.PI;
          p.x += Math.cos(ang)*sp; p.y += Math.sin(ang)*sp;
          let wr = false;
          if (p.x<0){p.x+=w;wr=true;} if (p.x>w){p.x-=w;wr=true;} if (p.y<0){p.y+=h;wr=true;} if (p.y>h){p.y-=h;wr=true;}
          if (wr) p.hist = []; p.hist.push([p.x,p.y]); if (p.hist.length>maxH) p.hist.shift();
          if (p.hist.length<2) continue;
          ctx.beginPath(); ctx.moveTo(p.hist[0][0],p.hist[0][1]);
          for (let i=1;i<p.hist.length;i++) ctx.lineTo(p.hist[i][0],p.hist[i][1]);
          ctx.strokeStyle = rgba(col, 0.12 + a.treble*0.5); ctx.lineWidth = 0.6 + a.bass*2.2; ctx.stroke();
        }
      },
      boids(s, ctx, w, h, a, beat, t, col) {
        if (!s.b) { const N = REDUCED ? 30 : 70; s.b = Array.from({length:N}, () => ({ x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2 })); }
        const B = s.b, maxSpeed = 1.2 + a.bass*5, perc2 = (Math.min(w,h)*0.42)**2, sepR2 = (Math.min(w,h)*0.12)**2;
        const aliW = 0.04 + a.mid*0.08, cohW = 0.005 + a.mid*0.02, sepW = 0.5 + a.treble*1.6;
        if (beat) for (const b of B) { b.vx += (b.x-w/2)*0.035; b.vy += (b.y-h/2)*0.035; }
        for (let i=0;i<B.length;i++) { const bi=B[i]; let ax=0,ay=0,cx=0,cy=0,sx=0,sy=0,cnt=0;
          for (let j=0;j<B.length;j++){ if(i===j)continue; const bj=B[j],dx=bi.x-bj.x,dy=bi.y-bj.y,d2=dx*dx+dy*dy;
            if(d2<perc2){ax+=bj.vx;ay+=bj.vy;cx+=bj.x;cy+=bj.y;cnt++; if(d2<sepR2){sx+=dx/(d2+1e-3);sy+=dy/(d2+1e-3);}}}
          if(cnt){ bi.vx+=(ax/cnt-bi.vx)*aliW+(cx/cnt-bi.x)*cohW+sx*sepW; bi.vy+=(ay/cnt-bi.vy)*aliW+(cy/cnt-bi.y)*cohW+sy*sepW; }
          bi.vx+=(Math.random()-0.5)*0.18; bi.vy+=(Math.random()-0.5)*0.18;
          const sp=Math.hypot(bi.vx,bi.vy); if(sp>maxSpeed){bi.vx=bi.vx/sp*maxSpeed;bi.vy=bi.vy/sp*maxSpeed;}
          bi.x+=bi.vx; bi.y+=bi.vy; if(bi.x<0)bi.x+=w; if(bi.x>w)bi.x-=w; if(bi.y<0)bi.y+=h; if(bi.y>h)bi.y-=h; }
        ctx.fillStyle = rgba(col, 0.85);
        for (const b of B) { const ang=Math.atan2(b.vy,b.vx), len=5+a.energy*6;

      swarmOpt(s, ctx, w, h, a, beat, t, col) {

          s.ps.forEach(p=>{p.bf=-1;p.vx+=(Math.random()-0.5)*(6+a.bass*16);p.vy+=(Math.random()-0.5)*(6+a.bass*16);});}

      antColony(s, ctx, w, h, a, beat, t, col) {

      // Golden-rectangle tiling: Fibonacci squares + quarter-circle spiral arcs,

      fibonacci(s, ctx, w, h, a, beat, t, col) {

            else if(dir===2){sz=maxy-miny;x=minx-sz;y=miny;minx-=sz;}

          (q)=>[q.x+q.sz,q.y,Math.PI/2],  (q)=>[q.x+q.sz,q.y+q.sz,Math.PI]];

                return[r*Math.cos(th),-r*Math.sin(th)];}},
            {n:"Heart",       f:"x = 16sin³θ    y = 13cosθ − 5cos2θ − 2cos3θ − cos4θ",
              p:(u)=>{const th=u*TAU;return[Math.pow(Math.sin(th),3)*16/17,-(13*Math.cos(th)-5*Math.cos(2*th)-2*Math.cos(3*th)-Math.cos(4*th))/17];}},
          ];
          s.mode=0;s.nx=1;s.mt=1;s.sw=t;s.drift=0;s.flash=[];
        }
        s.lo+=1+(a.tempo||1)*1.5;                    // Lorenz trajectory flows
        s.drift+=0.00035*(a.tempo||1);               // particles travel the curve at BPM pace
        const dur=6500/(a.tempo||1);                 // faster songs morph sooner
        if(s.mt>=1&&t-s.sw>dur){s.nx=(s.mode+1)%s.C.length;s.mt=0;}
        if(s.mt<1){s.mt+=0.012+(beat?0.012:0);if(s.mt>=1){s.mode=s.nx;s.sw=t;}}
        const ease=s.mt<1?(s.mt*s.mt*(3-2*s.mt)):1;
        const A=s.C[s.mode],B=s.C[s.nx];
        const N=REDUCED?60:110,S=Math.min(w,h)*0.34*(1+a.bass*0.12),cx=w/2,cy=h/2+h*0.05;
        const pts=[];
        for(let i=0;i<N;i++){
          const u=(i/N+s.drift)%1;
          const pa=A.p(u,t),pb=s.mt<1?B.p(u,t):pa;
          pts.push([cx+(pa[0]+(pb[0]-pa[0])*ease)*S+(Math.random()-0.5)*a.treble*7,
                    cy+(pa[1]+(pb[1]-pa[1])*ease)*S+(Math.random()-0.5)*a.treble*7]);}
        // electric outline through the particles
        ctx.strokeStyle=rgba(col,0.3+a.treble*0.45);ctx.lineWidth=1;
        ctx.beginPath();
        for(let i=0;i<N;i++){if(i===0)ctx.moveTo(pts[i][0],pts[i][1]);else ctx.lineTo(pts[i][0],pts[i][1]);}
        ctx.stroke();
        // glowing charge dots
        if(!REDUCED){ctx.shadowColor=rgba(col,0.9);ctx.shadowBlur=5+a.treble*12;}
        ctx.fillStyle=rgba(col,0.85);
        for(let i=0;i<N;i+=2){ctx.beginPath();ctx.arc(pts[i][0],pts[i][1],1+a.bass*2,0,TAU);ctx.fill();}
        ctx.shadowBlur=0;
        // beat lightning arcs between random charges
        if(beat)s.flash.push({a:(Math.random()*N)|0,b:(Math.random()*N)|0,l:1});
        s.flash=s.flash.filter(F=>F.l>0);
        for(const F of s.flash){F.l-=0.06;
          const P=pts[F.a%N],Q=pts[F.b%N];if(!P||!Q)continue;
          ctx.strokeStyle=rgba(col,Math.max(0,F.l));ctx.lineWidth=1.2;
          ctx.beginPath();ctx.moveTo(P[0],P[1]);
          ctx.lineTo((P[0]+Q[0])/2+(Math.random()-0.5)*14,(P[1]+Q[1])/2+(Math.random()-0.5)*14);
          ctx.lineTo(Q[0],Q[1]);ctx.stroke();}
        // live name + formula, crossfading during the morph
        const nameF=Math.max(11,w*0.045),formF=Math.max(8,w*0.026);
        ctx.textAlign="center";
        const show=(c2,al)=>{
          ctx.fillStyle=rgba(col,al);ctx.font="600 "+nameF+"px system-ui";
          ctx.fillText(c2.n,w/2,nameF+8);
          ctx.fillStyle=rgba(col,al*0.85);ctx.font=formF+"px monospace";
          ctx.fillText(c2.f,w/2,nameF+12+formF);};
        if(s.mt<1){show(A,1-ease);show(B,ease);}else show(A,0.92);
        ctx.textAlign="left";
      },
      // Curve Flow — neon glow line that wiggles and breathes, morphing between
      // the same 8 curves as Curve Morph; ambient particles drift toward the
      // curve and pulse in/out of existence. Styled after the signal-console
      // mathematical curve visualizer reference.
      curveFlow(s, ctx, w, h, a, beat, t, col) {
        const CNT=REDUCED?160:280;
        if(!s.M){
          const norm=(pts,sc=1)=>{let mx=-1e9,mn=1e9,my=-1e9,ny=1e9;
            for(const p of pts){mn=Math.min(mn,p[0]);mx=Math.max(mx,p[0]);ny=Math.min(ny,p[1]);my=Math.max(my,p[1]);}
            const s2=2/Math.max(mx-mn||1,my-ny||1)*sc,cx2=(mx+mn)/2,cy2=(my+ny)/2;
            return pts.map(([x,y])=>[(x-cx2)*s2,(y-cy2)*s2]);};
          const gen=(f,range)=>{const pts=[];for(let i=0;i<CNT;i++)pts.push(f(i/CNT*range));return pts;};
          const lor=[];{let x=0.1,y=0,z=25;
            for(let i=0;i<2400;i++){const dt=0.008,dx=10*(y-x),dy=x*(28-z)-y,dz=x*y-8/3*z;
              x+=dx*dt;y+=dy*dt;z+=dz*dt;if(i>150)lor.push([x,-(z-25)]);}}
          const lorR=[];for(let i=0;i<CNT;i++)lorR.push(lor[(i/CNT*lor.length)|0]);
          s.M=[
            {n:"Lissajous",f:"x = sin(3t)   y = sin(4t + π/2)",
              pts:norm(gen(tt=>[Math.sin(3*tt),Math.sin(4*tt+Math.PI/2)],TAU),1)},
            {n:"Rose",f:"r = sin(5θ)",
              pts:norm(gen(th=>{const r=Math.sin(5*th);return[r*Math.cos(th),r*Math.sin(th)];},TAU),1)},
            {n:"Butterfly",f:"r = e^sinθ − 2cos4θ + sin⁵((2θ−π)/24)",
              pts:norm(gen(th=>{const r=Math.exp(Math.sin(th))-2*Math.cos(4*th)+Math.pow(Math.sin((2*th-Math.PI)/24),5);
                return[r*Math.sin(th),-r*Math.cos(th)];},Math.PI*12),0.82)},
            {n:"Spirograph",f:"x = (R−r)cos t + d·cos(((R−r)/r)t)",
              pts:norm(gen(tt=>{const R=6,r=2.25,d=4.4;
                return[(R-r)*Math.cos(tt)+d*Math.cos((R-r)/r*tt),(R-r)*Math.sin(tt)-d*Math.sin((R-r)/r*tt)];},Math.PI*18),0.92)},
            {n:"Lorenz Attractor",f:"ẋ = σ(y−x)   ẏ = x(ρ−z)−y   ż = xy−βz",
              pts:norm(lorR,0.95)},
            {n:"Trefoil Knot",f:"x = sinθ + 2sin2θ   y = cosθ − 2cos2θ",
              pts:norm(gen(th=>[Math.sin(th)+2*Math.sin(2*th),-(Math.cos(th)-2*Math.cos(2*th))],TAU),0.95)},
            {n:"Superformula",f:"r = (|cos(mθ/4)|^n₂ + |sin(mθ/4)|^n₃)^(−1/n₁)",
              pts:norm(gen(th=>{let r=Math.pow(Math.pow(Math.abs(Math.cos(7*th/4)),0.4)+Math.pow(Math.abs(Math.sin(7*th/4)),0.4),-1/0.75);
                if(!isFinite(r))r=0;r=Math.min(r,2);return[r*Math.cos(th),-r*Math.sin(th)];},TAU),0.9)},
            {n:"Heart",f:"x = 16sin³t   y = 13cos t − 5cos2t − 2cos3t − cos4t",
              pts:norm(gen(tt=>[16*Math.pow(Math.sin(tt),3),-(13*Math.cos(tt)-5*Math.cos(2*tt)-2*Math.cos(3*tt)-Math.cos(4*tt))],TAU),0.88)},
          ];
          s.mode=0;s.nx=0;s.mp=1;s.sw=t;
          s.disp=s.M[0].pts.map(p=>[...p]);s.from=s.disp;s.to=s.disp;
          const PN=REDUCED?26:55;
          s.par=Array.from({length:PN},()=>({x:Math.random()*2-1,y:Math.random()*2-1,
            vx:(Math.random()-0.5)*0.004,vy:(Math.random()-0.5)*0.004,
            size:Math.random()*1.6+0.6,ph:Math.random()*TAU,life:Math.random()}));
        }
        // auto-morph at BPM cadence
        const dur=5200/(a.tempo||1);
        if(s.mp>=1&&t-s.sw>dur){
          s.nx=(s.mode+1)%s.M.length;
          s.from=s.disp.map(p=>[...p]);s.to=s.M[s.nx].pts;s.mp=0;}
        if(s.mp<1){s.mp+=0.014+(beat?0.012:0);
          if(s.mp>=1){s.mode=s.nx;s.sw=t;}
          const e2=s.mp<0.5?4*s.mp**3:1-Math.pow(-2*s.mp+2,3)/2;
          s.disp=s.from.map((p,i)=>[p[0]+(s.to[i][0]-p[0])*e2,p[1]+(s.to[i][1]-p[1])*e2]);}
        const S=Math.min(w,h)*0.36,cx=w/2,cy=h/2+h*0.05;
        const breathe=1+Math.sin(t*0.0018)*0.012+a.bass*0.07;
        const wig=1.1+a.treble*5;
        // screen-space wiggled points
        const P=s.disp.map(([x,y],i)=>[
          cx+x*S*breathe+Math.sin(i*0.31+t*0.006)*wig,
          cy+y*S*breathe+Math.cos(i*0.19+t*0.004)*wig]);
        ctx.save();ctx.globalCompositeOperation="lighter";
        // ambient particles: drift toward their curve point, pulse in & out
        for(const p of s.par){
          const tp=P[((p.ph/TAU)*P.length|0)%P.length];
          p.x+=p.vx;p.y+=p.vy;
          let px=cx+p.x*S,py=cy+p.y*S;
          if(tp){px+=(tp[0]-px)*0.014;py+=(tp[1]-py)*0.014;p.x=(px-cx)/S;p.y=(py-cy)/S;}
          if(Math.abs(p.x)>1.4)p.vx*=-1;if(Math.abs(p.y)>1.4)p.vy*=-1;
          p.life-=0.004+(beat?0.05:0);
          if(p.life<=0){p.x=Math.random()*2-1;p.y=Math.random()*2-1;p.life=1;p.ph=Math.random()*TAU;} // reborn elsewhere
          const pulse=0.45+0.55*Math.sin(t*0.004+p.ph);
          const fade=Math.min(1,p.life*4)*Math.min(1,(1-p.life)*6); // appear & disappear
          ctx.fillStyle=rgba(col,(0.1+pulse*0.4)*fade*(0.6+a.energy*0.6));
          ctx.beginPath();ctx.arc(px,py,p.size+pulse*1.2+a.bass*1.5,0,TAU);ctx.fill();}
        // layered glow strokes (wide halo -> violet mid -> bright core)
        const trace=(off,jit)=>{ctx.beginPath();
          for(let i=0;i<P.length;i++){const j=jit?Math.sin(i*0.31+t*0.006)*1.4:0,j2=jit?Math.cos(i*0.19+t*0.004)*1.2:0;
            if(i===0)ctx.moveTo(P[i][0]+j,P[i][1]+j2);else ctx.lineTo(P[i][0]+j,P[i][1]+j2);}
          ctx.closePath();ctx.stroke();};
        ctx.lineWidth=12+a.bass*8;ctx.strokeStyle=rgba(col,0.05);trace(0,false);
        ctx.lineWidth=5;ctx.strokeStyle=rgba(hueRotate(col,55),0.16+a.mid*0.1);trace(0,false);
        ctx.lineWidth=1.8+a.bass*1.2;ctx.strokeStyle=rgba(col,0.9);trace(0,true);
        // sparks racing along the curve (BPM pace, brighter on beats)
        const SPK=REDUCED?5:8;
        for(let k=0;k<SPK;k++){
          const idx=(((t*0.06*(a.tempo||1)+k*(P.length/SPK))|0)%P.length+P.length)%P.length;
          const r=2+Math.sin(t*0.01+k)*1.2+a.treble*2;
          ctx.fillStyle=rgba(hueRotate(col,k*30),0.85);
          ctx.beginPath();ctx.arc(P[idx][0],P[idx][1],r,0,TAU);ctx.fill();}
        ctx.restore();
        // name + formula (crossfade during morph)
        const A2=s.M[s.mode],B2=s.M[s.nx];
        const nameF=Math.max(11,w*0.045),formF=Math.max(8,w*0.025);
        ctx.textAlign="center";
        const show=(c2,al)=>{
          ctx.fillStyle=rgba(col,al);ctx.font="600 "+nameF+"px system-ui";
          ctx.fillText(c2.n,w/2,nameF+8);
          ctx.fillStyle=rgba(col,al*0.85);ctx.font=formF+"px monospace";
          ctx.fillText(c2.f,w/2,nameF+12+formF);};
        if(s.mp<1){show(A2,1-s.mp);show(B2,s.mp);}else show(A2,0.92);
        ctx.textAlign="left";
      },
      // Lava lamp: metaball goo with heat-driven buoyancy. Bass = heat.
      lavaLamp(s, ctx, w, h, a, beat, t, col) {
        const G=REDUCED?40:56;
        if(!s.bl){
          const N=REDUCED?5:7;
          s.bl=Array.from({length:N},(_,i)=>({x:0.2+Math.random()*0.6,y:0.3+Math.random()*0.6,
            vy:0,r:0.10+Math.random()*0.09,heat:Math.random(),wob:Math.random()*TAU}));
          s.cv=document.createElement("canvas");s.cv.width=G;s.cv.height=G;s.cctx=s.cv.getContext("2d");s.img=s.cctx.createImageData(G,G);}
        const heat=0.2+a.bass*1.4; // music heats the lamp
        for(const b of s.bl){
          b.heat+=((b.y>0.55?heat:0)-(b.y<0.4?0.3:0))*0.012; // warms at bottom, cools at top
          b.heat=Math.max(0,Math.min(1.4,b.heat));
          b.vy+=(0.35-b.heat)*0.00045;                        // hot rises, cool sinks
          b.vy*=0.985; b.y+=b.vy*(a.tempo||1);
          b.wob+=0.015+a.mid*0.03;
          b.x+=Math.sin(b.wob)*0.0016*(1+a.treble*2);
          if(b.y<0.12){b.y=0.12;b.vy=Math.abs(b.vy)*0.25;}
          if(b.y>0.9){b.y=0.9;b.vy=-Math.abs(b.vy)*0.25;}
          b.x=Math.max(0.12,Math.min(0.88,b.x));
          if(beat&&a.bass>0.4&&Math.random()<0.3)b.vy-=0.0035; // beats burp the goo
        }
        const iso=1.0,d=s.img.data,hot=hueRotate(col,-18);
        for(let y=0;y<G;y++)for(let x=0;x<G;x++){
          const u=x/G,v=y/G;let f=0,hsum=0;
          for(const b of s.bl){const dx=u-b.x,dy=(v-b.y)*1.15,q=b.r*b.r/(dx*dx+dy*dy+1e-5);f+=q;hsum+=q*b.heat;}
          const i4=(y*G+x)*4;
          if(f<iso*0.75){d[i4+3]=0;continue;}
          const edge=Math.min(1,(f-iso*0.75)/(iso*0.55));            // smooth goo edge
          const hh=Math.min(1,hsum/f);                                // blob temperature
          const p=hh>0.55?hot:col;
          const rim=edge<0.45?1.35:1;                                 // brighter rim
          d[i4]=Math.min(255,p.r*rim);d[i4+1]=Math.min(255,p.g*rim);d[i4+2]=Math.min(255,p.b*rim);
          d[i4+3]=Math.min(1,edge)*(190+a.energy*60);}
        s.cctx.putImageData(s.img,0,0);
        ctx.imageSmoothingEnabled=true;ctx.drawImage(s.cv,0,0,w,h);
        // faint glass highlights
        ctx.strokeStyle=rgba(col,0.1+a.treble*0.1);ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(w*0.12,h*0.06);ctx.lineTo(w*0.12,h*0.94);ctx.stroke();
        ctx.beginPath();ctx.moveTo(w*0.88,h*0.06);ctx.lineTo(w*0.88,h*0.94);ctx.stroke();
      },
    };

    // ===== UI WIRING (cards) =====
    const grid = document.getElementById("grid");
    const cardEls = {}, cardCanvas = {}, cardViz = {};
    for (const m of MOODS) {
      const el = document.createElement("div");
      el.className = "card"; el.dataset.id = m.id; el.style.background = m.gradient;
      el.style.setProperty("--accent", m.accent); el.style.setProperty("--react-scale","1"); el.style.setProperty("--react-glow","0");
      const canvas = document.createElement("canvas"); canvas.className = "viz"; el.appendChild(canvas);
      const label = document.createElement("div"); label.className = "label";
      label.innerHTML = `<span>${m.emoji}</span><span>${m.label}</span>`; el.appendChild(label);
      grid.appendChild(el);
      cardEls[m.id] = el; cardCanvas[m.id] = { canvas, ctx: canvas.getContext("2d") };
      cardViz[m.id] = { key: m.viz, s: {}, col: hexToRgb(m.accent) };
    }

    function fitCanvas(entry) {
      const { canvas } = entry, r = canvas.getBoundingClientRect();
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const w = Math.max(1, Math.round(r.width)), h = Math.max(1, Math.round(r.height));
      if (canvas.width !== Math.round(w*dpr) || canvas.height !== Math.round(h*dpr)) { canvas.width = Math.round(w*dpr); canvas.height = Math.round(h*dpr); }
      entry.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { w, h, rect: r };
    }

    // ===== DYNAMIC LOADING (IntersectionObserver) =====
    // A card's visualizer only initializes and draws while it is (near) the
    // viewport. When it scrolls far away, its canvas backing store is released
    // and heavy per-viz state (particle arrays etc.) is dropped.
    const visible = new Set();
    const io = new IntersectionObserver((entries) => {
      for (const en of entries) {
        const id = en.target.dataset.id;
        if (en.isIntersecting) {
          visible.add(id);
        } else {
          visible.delete(id);
          const entry = cardCanvas[id];
          // Free the canvas backing store and reset viz state.
          entry.canvas.width = 0; entry.canvas.height = 0;
          cardViz[id].s = {};
        }
      }
    }, { rootMargin: "120px 0px" }); // pre-load slightly before entering view
    for (const m of MOODS) io.observe(cardEls[m.id]);

    // ===== UI WIRING (player) =====
    const TRACKS = [
      { id:"chill", name:"Chill Loop", opts:{ bpm:80,  hat:true } },
      { id:"hype",  name:"Hype Loop",  opts:{ bpm:140, hat:true } },
      { id:"deep",  name:"Deep Loop",  opts:{ bpm:100, hat:false } },
    ];
    const trackSelect = document.getElementById("trackSelect");
    for (const t of TRACKS) { const o = document.createElement("option"); o.value = t.id; o.textContent = t.name; trackSelect.appendChild(o); }
    const playBtn = document.getElementById("playBtn");
    async function buildTracks() { for (const t of TRACKS) { engine.ensureCtx(); engine.setBuffer(t.id, await engine.makeLoop(t.opts)); } }
    playBtn.addEventListener("click", () => {
      engine.ensureCtx(); engine.toggle(trackSelect.value);
      document.getElementById("micBtn").classList.remove("live");
      document.getElementById("tabBtn").classList.remove("live");
      playBtn.textContent = engine.playing ? "⏸ Pause" : "▶ Play"; renderPlaylist();
    });
    trackSelect.addEventListener("change", () => { if (engine.playing) { engine.offset = 0; engine.play(trackSelect.value); renderPlaylist(); } });

    // ===== UI WIRING (upload + playlist) =====
    const uploadBtn = document.getElementById("uploadBtn"), fileInput = document.getElementById("fileInput"), errorMsg = document.getElementById("errorMsg");
    const playlistEl = document.getElementById("playlist");
    const prevBtn = document.getElementById("prevBtn"), nextBtn = document.getElementById("nextBtn");
    const playlist = []; // [{id, name}] uploaded tracks, played in order
    let plSeq = 0;

    function renderPlaylist() {
      playlistEl.innerHTML = "";
      for (const item of playlist) {
        const chip = document.createElement("div");
        chip.className = "pl-item" + (engine.current === item.id ? " current" : "");
        chip.title = item.name;
        const nm = document.createElement("span"); nm.className = "name"; nm.textContent = item.name;
        const rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "✕"; rm.title = "Remove";
        chip.appendChild(nm); chip.appendChild(rm);
        chip.addEventListener("click", () => playTrack(item.id));
        rm.addEventListener("click", (e) => { e.stopPropagation(); removeTrack(item.id); });
        playlistEl.appendChild(chip);
      }
    }

    function playTrack(id) {
      engine.offset = 0;
      engine.play(id); // also stops any live capture
      micBtn.classList.remove("live"); tabBtn.classList.remove("live");
      trackSelect.value = id;
      playBtn.textContent = "⏸ Pause";
      renderPlaylist();
    }

    function removeTrack(id) {
      const idx = playlist.findIndex(p => p.id === id);
      if (idx === -1) return;
      playlist.splice(idx, 1);
      delete engine.buffers[id];
      const opt = trackSelect.querySelector(`option[value="${id}"]`); if (opt) opt.remove();
      if (engine.current === id) {
        engine.stop();
        if (playlist.length) playTrack(playlist[Math.min(idx, playlist.length - 1)].id);
        else { engine.current = null; trackSelect.value = TRACKS[0].id; playBtn.textContent = "▶ Play"; }
      }
      renderPlaylist();
    }

    // ===== Loop modes: all (default) / one / off =====
    const loopBtn = document.getElementById("loopBtn");
    const LOOP_MODES = [
      { mode: "all", icon: "🔁", title: "Loop: all tracks" },
      { mode: "one", icon: "🔂", title: "Loop: repeat current track" },
      { mode: "off", icon: "➡️", title: "Loop: off (stop after last track)" },
    ];
    let loopIdx = 0;
    loopBtn.addEventListener("click", () => {
      loopIdx = (loopIdx + 1) % LOOP_MODES.length;
      loopBtn.textContent = LOOP_MODES[loopIdx].icon;
      loopBtn.title = LOOP_MODES[loopIdx].title;
    });

    // Auto-advance: when a playlist track finishes naturally, follow the loop mode.
    engine.onTrackEnd = () => {
      const mode = LOOP_MODES[loopIdx].mode;
      if (mode === "one" && engine.current) { playTrack(engine.current); return; }
      const idx = playlist.findIndex(p => p.id === engine.current);
      if (idx === -1 || !playlist.length) { playBtn.textContent = "▶ Play"; renderPlaylist(); return; }
      if (mode === "off" && idx === playlist.length - 1) { playBtn.textContent = "▶ Play"; renderPlaylist(); return; }
      playTrack(playlist[(idx + 1) % playlist.length].id);
    };

    // ===== Live capture: microphone / tab audio (e.g. YouTube) =====
    const micBtn = document.getElementById("micBtn");
    const tabBtn = document.getElementById("tabBtn");
    function setLiveUI(btn) {
      micBtn.classList.toggle("live", btn === micBtn);
      tabBtn.classList.toggle("live", btn === tabBtn);
      if (btn) playBtn.textContent = "▶ Play";
      renderPlaylist();
    }
    engine.onLiveEnd = () => setLiveUI(null);

    async function startLive(btn, getStream, noAudioMsg) {
      errorMsg.textContent = "";
      if (btn.classList.contains("live")) { engine.stopLive(); setLiveUI(null); return; }
      try {
        const stream = await getStream();
        if (!stream.getAudioTracks().length) {
          stream.getTracks().forEach(tr => tr.stop());
          errorMsg.textContent = noAudioMsg;
          return;
        }
        engine.playLive(stream);
        setLiveUI(btn);
      } catch (e) {
        if (e && (e.name === "NotAllowedError" || e.name === "AbortError")) errorMsg.textContent = "Capture permission denied.";
        else errorMsg.textContent = "Could not start capture.";
      }
    }
    micBtn.addEventListener("click", () => startLive(micBtn,
      () => navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } }),
      "No microphone available."));
    tabBtn.addEventListener("click", () => startLive(tabBtn,
      () => navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }),
      "No audio shared — pick a tab and tick 'Share tab audio'."));

    function nav(dir) {
      const opts = [...trackSelect.options].map(o => o.value);
      if (!opts.length) return;
      const cur = Math.max(0, opts.indexOf(trackSelect.value));
      playTrack(opts[(cur + dir + opts.length) % opts.length]);
    }
    prevBtn.addEventListener("click", () => nav(-1));
    nextBtn.addEventListener("click", () => nav(1));

    uploadBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      const files = [...fileInput.files]; if (!files.length) return;
      errorMsg.textContent = "";
      engine.ensureCtx();
      const failed = [];
      let firstNew = null;
      for (const file of files) {
        try {
          const buf = await file.arrayBuffer();
          const decoded = await engine.ctx.decodeAudioData(buf);
          const id = "pl-" + (plSeq++);
          engine.setBuffer(id, decoded);
          playlist.push({ id, name: file.name });
          const opt = document.createElement("option");
          opt.value = id; opt.textContent = "♪ " + file.name;
          trackSelect.appendChild(opt);
          if (!firstNew) firstNew = id;
        } catch (e) { failed.push(file.name); }
      }
      fileInput.value = "";
      if (failed.length) errorMsg.textContent = "Could not decode: " + failed.join(", ");
      if (firstNew && !engine.playing) playTrack(firstNew);
      else renderPlaylist();
    });

    // ===== UI WIRING (spotlight + zoom) =====
    // Click a card to focus it; click the focused card again to zoom it
    // fullscreen as the primary audio visualizer.
    let focused = null;
    function setFocus(id) {
      if (focused) cardEls[focused].classList.remove("focused");
      focused = id;
      if (id) { grid.classList.add("has-focus"); cardEls[id].classList.add("focused"); } else { grid.classList.remove("has-focus"); }
    }
    const zoomEl = document.getElementById("zoom");
    const zoomCanvas = document.getElementById("zoomCanvas");
    const zoomCtx = zoomCanvas.getContext("2d");
    const zoomLabel = document.getElementById("zoomLabel");
    let zoomed = null, zoomState = {};
    function openZoom(id) {
      zoomed = id; zoomState = {};
      const m = MOODS.find(x => x.id === id);
      zoomLabel.textContent = m.emoji + " " + m.label;
      zoomEl.hidden = false;
      document.body.style.overflow = "hidden";
    }
    function closeZoom() {
      zoomed = null; zoomEl.hidden = true;
      document.body.style.overflow = "";
      zoomCanvas.width = 0; zoomCanvas.height = 0; // free backing store
    }
    zoomEl.addEventListener("click", closeZoom);
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { if (zoomed) closeZoom(); else setFocus(null); }
    });

    // ===== Zoom ambience FX (toggle chips) =====
    const FX = { aurora: true, waves: true, hue: true, flash: true };
    let hueShift = 0, zoomFlash = 0;
    document.getElementById("zoomFx").addEventListener("click", (e) => {
      e.stopPropagation(); // don't close the zoom overlay
      const btn = e.target.closest("button[data-fx]"); if (!btn) return;
      FX[btn.dataset.fx] = !FX[btn.dataset.fx];
      btn.classList.toggle("on", FX[btn.dataset.fx]);
    });

    const AURORA = [{ p: 0, s: 0.9 }, { p: 2.1, s: 0.7 }, { p: 4.2, s: 1.15 }, { p: 5.6, s: 0.55 }];
    function drawAurora(ctx, w, h, a, t, col) {
      for (let i = 0; i < AURORA.length; i++) { const B = AURORA[i];
        const x = w*(0.5 + 0.38*Math.sin(t*0.00012*B.s + B.p)), y = h*(0.5 + 0.38*Math.cos(t*0.00009*B.s + B.p*1.7));
        const r = Math.min(w, h)*(0.33 + a.bass*0.22)*B.s;
        const c2 = hueRotate(col, i*40);
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, rgba(c2, 0.20 + a.energy*0.12)); g.addColorStop(1, rgba(c2, 0));
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); }
    }
    function drawWaves(ctx, w, h, a, t, col) {
      for (let k = 0; k < 3; k++) {
        const yb = h*(0.3 + k*0.22), amp = h*0.05 + a.bass*h*0.12, c2 = hueRotate(col, k*25 + 180);
        const g = ctx.createLinearGradient(0, yb - amp, 0, yb + amp*2);
        g.addColorStop(0, rgba(c2, 0)); g.addColorStop(0.5, rgba(c2, 0.10 + a.energy*0.08)); g.addColorStop(1, rgba(c2, 0));
        ctx.fillStyle = g; ctx.beginPath(); ctx.moveTo(0, h);
        for (let x = 0; x <= w; x += w/60) ctx.lineTo(x, yb + Math.sin(x*0.004 + t*0.0005*(k+1) + k*2)*amp);
        ctx.lineTo(w, h); ctx.closePath(); ctx.fill(); }
    }
    function drawVignette(ctx, w, h, a, flash, col) {
      const al = flash*0.45 + a.energy*0.10;
      if (al < 0.02) return;
      const g = ctx.createRadialGradient(w/2, h/2, Math.min(w, h)*0.35, w/2, h/2, Math.max(w, h)*0.75);
      g.addColorStop(0, "rgba(0,0,0,0)"); g.addColorStop(1, rgba(col, al));
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    }
    for (const m of MOODS) cardEls[m.id].addEventListener("click", (e) => {
      e.stopPropagation();
      if (focused === m.id) openZoom(m.id);   // second click on focused card -> zoom
      else setFocus(m.id);                     // first click -> focus
    });
    grid.addEventListener("click", () => setFocus(null));

    // ===== UI WIRING (page background) =====
    const bgBtn=document.getElementById("bgBtn"),bgPanel=document.getElementById("bgPanel");
    const bgWall=document.getElementById("bgWall"),bgFile=document.getElementById("bgFile");
    const bgFit=document.getElementById("bgFit"),bgGrad=document.getElementById("bgGrad");
    const bgAnimBtn=document.getElementById("bgAnimBtn"),bgHide=document.getElementById("bgHide");
    let bgUrl=null, bgTheme="", bgAnim=true;
    bgBtn.addEventListener("click",()=>{bgPanel.hidden=!bgPanel.hidden;}); // 🎨 BG toggles the panel
    bgHide.addEventListener("click",()=>{bgPanel.hidden=true;});           // explicit collapse
    function applyGrad(){
      bgGrad.className=""; // reset
      if(bgTheme){bgGrad.classList.add(bgTheme,"on"); if(bgAnim)bgGrad.classList.add("anim");
        document.body.classList.add("has-grad");}
      else document.body.classList.remove("has-grad");
    }
    bgPanel.querySelectorAll(".sw").forEach(sw=>sw.addEventListener("click",()=>{
      bgPanel.querySelectorAll(".sw").forEach(b=>b.classList.remove("active"));
      sw.classList.add("active");
      bgTheme=sw.dataset.bg; applyGrad();
    }));
    bgAnimBtn.addEventListener("click",()=>{
      bgAnim=!bgAnim; bgAnimBtn.textContent="🎞️ Animate: "+(bgAnim?"On":"Off"); applyGrad();
    });
    document.getElementById("bgImgBtn").addEventListener("click",()=>bgFile.click());
    bgFile.addEventListener("change",()=>{
      const f=bgFile.files[0]; if(!f)return;
      if(bgUrl)URL.revokeObjectURL(bgUrl);
      bgUrl=URL.createObjectURL(f);
      bgWall.style.backgroundImage=`url(${bgUrl})`;
      bgWall.style.display="block";
      document.body.classList.add("has-wall");
      bgFile.value="";
    });
    bgFit.addEventListener("change",()=>{bgWall.className=bgFit.value;});
    document.getElementById("bgClear").addEventListener("click",()=>{
      bgWall.style.display="none";bgWall.style.backgroundImage="";
      document.body.classList.remove("has-wall");
      if(bgUrl){URL.revokeObjectURL(bgUrl);bgUrl=null;}
    });

    // ===== UI WIRING (scrubber seek) =====
    const scrubber = document.getElementById("scrubber"), scrubberFill = document.getElementById("scrubberFill");
    scrubber.addEventListener("click", (e) => {
      if (!engine.duration) return;
      const rect = scrubber.getBoundingClientRect(), ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      engine.offset = ratio * engine.duration; if (engine.playing) engine.play(engine.current);
    });

    // ===== Motion beat pops =====
    const lastPop = {};
    function fireBeatPop(el, mood) {
      const now = Date.now(); if (lastPop[mood.id] && now - lastPop[mood.id] < 120) return; lastPop[mood.id] = now;
      if (mood.style !== "pop" && mood.style !== "bounce") return;
      animate(el.querySelector(".label"), { transform: ["scale(1)","scale(1.2)","scale(1)"] }, { type: spring, stiffness: 500, damping: 12 });
    }

    // ===== RENDER LOOP (with viewport culling) =====
    const detectors = {}; MOODS.forEach(m => detectors[m.id] = makeBeatDetector(1.35, 0.9));
    const vuBars = document.querySelectorAll("#vu span");
    // ===== TEMPO / BPM TRACKER =====
    // Median interval between detected beats -> bpm -> a.tempo speed factor.
    const tempoDet = makeBeatDetector(1.32, 0.92);
    const tempo = { last: 0, ints: [], bpm: 100 };
    function updateTempo(a, now) {
      if (tempoDet.update(a.energy)) {
        const dt = now - tempo.last; tempo.last = now;
        if (dt > 240 && dt < 2000) {
          tempo.ints.push(dt); if (tempo.ints.length > 8) tempo.ints.shift();
          const s = tempo.ints.slice().sort((x, y) => x - y);
          tempo.bpm = 60000 / s[Math.floor(s.length / 2)];
        }
      }
      a.bpm = tempo.bpm;
      a.tempo = Math.min(2.2, Math.max(0.35, tempo.bpm / 110));
    }

    function updateMeters(a) {
      vuBars.forEach((bar, i) => { const val = [a.bass,(a.bass+a.mid)/2,a.mid,(a.mid+a.treble)/2,a.treble][i]; bar.style.height = (2+val*22).toFixed(0) + "px"; });
      if (engine.duration) scrubberFill.style.width = ((engine.elapsed() % engine.duration) / engine.duration * 100).toFixed(1) + "%";
    }

    function frame(now) {
      const a = (engine.playing || engine.live) ? engine.read() : idleAudio(now);
      updateTempo(a, now);

      // Zoom mode: the zoomed card's algorithm becomes the primary visualizer.
      if (zoomed) {
        let zoomBeat = false;
        for (const m of MOODS) { const b = detectors[m.id].update(a.energy); if (m.id === zoomed) zoomBeat = b; }
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const zw = window.innerWidth, zh = window.innerHeight;
        if (zoomCanvas.width !== Math.round(zw*dpr) || zoomCanvas.height !== Math.round(zh*dpr)) { zoomCanvas.width = Math.round(zw*dpr); zoomCanvas.height = Math.round(zh*dpr); }
        zoomCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        zoomCtx.clearRect(0, 0, zw, zh);
        const m = MOODS.find(x => x.id === zoomed);
        // Ambience FX pipeline: hue-rotated palette -> backgrounds -> viz -> vignette
        if (FX.hue) hueShift = (hueShift + 0.05 + a.bass*0.8) % 360;
        const fxCol = FX.hue ? hueRotate(cardViz[zoomed].col, hueShift) : cardViz[zoomed].col;
        zoomFlash = zoomBeat ? 1 : zoomFlash * 0.93;
        if (FX.aurora) drawAurora(zoomCtx, zw, zh, a, now, fxCol);
        if (FX.waves) drawWaves(zoomCtx, zw, zh, a, now, fxCol);
        VIZ[m.viz](zoomState, zoomCtx, zw, zh, a, zoomBeat, now, fxCol);
        if (FX.flash) drawVignette(zoomCtx, zw, zh, a, zoomFlash, fxCol);
        updateMeters(a);
        requestAnimationFrame(frame);
        return;
      }

      for (const m of MOODS) {
        const beat = detectors[m.id].update(a.energy); // detectors stay warm even off-screen
        if (!visible.has(m.id)) continue;               // dynamic loading: skip everything else
        const el = cardEls[m.id];
        let scale = 1, glow = 0, x = 0;
        switch (m.style) {
          case "float":   scale = 1 + a.bass*0.12;            glow = a.treble*0.6; break;
          case "pop":     scale = 1 + (beat ? 0.16 : a.energy*0.05); glow = a.energy*0.9; break;
          case "eq":      scale = 1 + a.mid*0.06;             glow = (a.bass+a.treble)/2*0.7; break;
          case "flicker": scale = 1 + a.energy*0.05;          glow = (beat ? 1 : a.energy)*(0.4+Math.random()*0.4); break;
          case "bounce":  scale = 1 + (beat ? 0.18 : 0) + a.bass*0.05; glow = a.treble*0.8; break;
          case "sway":    scale = 1 + a.treble*0.08;          glow = a.treble*0.9; x = Math.sin(now/200)*a.mid*12; break;
        }
        const focusMul = (m.id === focused) ? 1.12 : 1;
        el.style.setProperty("--react-scale", (scale*focusMul).toFixed(3));
        el.style.setProperty("--react-glow", glow.toFixed(3));
        el.style.setProperty("--react-x", x.toFixed(1) + "px");

        const entry = cardCanvas[m.id];
        const { w, h } = fitCanvas(entry); const ctx = entry.ctx; ctx.clearRect(0, 0, w, h);
        const v = cardViz[m.id]; VIZ[v.key](v.s, ctx, w, h, a, beat, now, v.col);
        if (beat) fireBeatPop(el, m);
      }
      updateMeters(a);
      requestAnimationFrame(frame);
    }

    // ===== INIT =====
    function playEntrance() {
      Object.values(cardEls).forEach((el, i) => {
        el.style.opacity = "0";
        animate(el, { opacity: [0,1], transform: ["translateY(20px) scale(0.96)","translateY(0) scale(1)"] }, { type: spring, stiffness: 320, damping: 24, delay: Math.min(i*0.04, 1.0) });
        el.style.opacity = "1";
      });
    }
    async function init() {
      playEntrance(); await buildTracks(); requestAnimationFrame(frame);
      if (location.hash === "#test") runSelfTests();
    }
    init();
  </script>
</body>
</html>
